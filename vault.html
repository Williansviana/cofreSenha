<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💼 Cofre de Senhas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>💼 Cofre de Senhas</h1>
    <p><strong>Logado como:</strong> <span id="userEmail"></span></p>

    <!-- Formulário de Adicionar/Editar -->
    <div class="add-form">
      <input type="text" id="site" placeholder="Site (ex: google.com)" />
      <input type="text" id="login" placeholder="Login" />
      <input type="text" id="senha" placeholder="Senha" />

      <!-- Botões -->
      <div>
        <button id="addButton">Adicionar</button>
        <button id="saveEditButton" class="hidden">Salvar Alterações</button>
        <button id="cancelEditButton" class="hidden">Cancelar</button>
      </div>
    </div>

    <!-- Lista de Senhas -->
    <ul id="passwordList"></ul>

    <button onclick="logout()" style="background: #e74c3c;">Sair da Conta</button>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <!-- Configuração do Firebase -->
  <script src="firebase-config.js"></script>

  <!-- Scripts -->
  <script src="script.js"></script>
</body>
</html>
